<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mandir__Mithra</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Noto+Sans+Telugu&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>🪔 Mandir__Mithra</h1>
      <p>Ask about temples in Telangana & Andhra Pradesh (in English or Telugu)</p>
    </header>

    <div id="chatbox">
      <!-- Messages will appear here -->
    </div>

    <div id="user-input">
      <input type="text" id="user-message" placeholder="ఏం కావాలి? / What would you like to know?" />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
